name: CI Validacao de PR

on:
  pull_request:
    branches:
      - main

jobs:
  validar_codigo:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o código
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Executar bateria de testes oculta
      run: |
        echo "" | base64 -d > test_secreto.py
        python -m unittest test_secreto.py